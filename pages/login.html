<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AGROBIASHARA</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Main Header -->
    <header class="main-header">
        <div class="container-fluid">
            <div class="header-content">
                <!-- [img src="../images/logo.png" alt="AGROBIASHARA Logo" style="width:60px; height:60px; border-radius:8px;"] -->
                <a href="../index.html" class="logo">
                    <div class="logo-placeholder">
                        <i class="fas fa-leaf"></i>
                    </div>
                    <span class="logo-text">AGROBIASHARA</span>
                </a>
            </div>
        </div>
    </header>

    <!-- Login Form -->
    <section style="padding: 3rem 20px; max-width: 500px; margin: 0 auto;">
        <div class="form-container">
            <h2 style="text-align: center; margin-bottom: 2rem; color: var(--primary-green);">
                <i class="fas fa-sign-in-alt"></i> Login
            </h2>
            
            <form onsubmit="handleLogin(event)" title="Login form">
                <div class="form-group">
                    <label>Email Address *</label>
                    <input type="email" required placeholder="your@email.com" title="Enter your email">
                </div>

                <div class="form-group">
                    <label>Password *</label>
                    <input type="password" required placeholder="Enter password" title="Enter your password">
                </div>

                <div class="form-group">
                    <label>
                        <input type="checkbox" title="Remember me"> Remember me
                    </label>
                </div>

                <button type="submit" class="form-submit" title="Sign in to your account">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>

            <div style="text-align: center; margin-top: 1.5rem;">
                <p>Don't have an account? <a href="register.html" style="color: var(--primary-green); font-weight: 600; text-decoration: none;" title="Create new account">Register here</a></p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container-fluid">
            <div class="footer-bottom">
                <p>&copy; 2024 AGROBIASHARA</p>
            </div>
        </div>
    </footer>

    <script src="../js/main.js"></script>
</body>
</html>
