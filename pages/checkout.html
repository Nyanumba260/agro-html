<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - AGROBIASHARA</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Main Header -->
    <header class="main-header">
        <div class="container-fluid">
            <div class="header-content">
                <!-- [img src="../images/logo.png" alt="AGROBIASHARA Logo" style="width:60px; height:60px; border-radius:8px;"] -->
                <a href="../index.html" class="logo">
                    <div class="logo-placeholder">
                        <i class="fas fa-leaf"></i>
                    </div>
                    <span class="logo-text">AGROBIASHARA</span>
                </a>
            </div>
        </div>
    </header>

    <!-- Checkout Form -->
    <section style="padding: 2rem 20px; max-width: 1000px; margin: 0 auto;">
        <h1 style="margin-bottom: 2rem;">Checkout</h1>
        
        <form id="checkoutForm" class="form-container" style="max-width: 100%; background: white;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" required placeholder="Your name" title="Enter your full name">
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" required placeholder="your@email.com" title="Enter your email address">
                </div>
            </div>

            <div class="form-group">
                <label>Phone Number *</label>
                <input type="tel" required placeholder="+254 7XX XXX XXX" title="Enter your phone number">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                <div class="form-group">
                    <label>Delivery Location *</label>
                    <select id="deliveryLocation" required title="Select delivery location">
                        <option value="">Select Location</option>
                        <option value="Nairobi">Nairobi</option>
                        <option value="Kiambu">Kiambu</option>
                        <option value="Nakuru">Nakuru</option>
                        <option value="Kisumu">Kisumu</option>
                        <option value="Mombasa">Mombasa</option>
                        <option value="Kericho">Kericho</option>
                        <option value="Eldoret">Eldoret</option>
                        <option value="Machakos">Machakos</option>
                        <option value="Nyeri">Nyeri</option>
                        <option value="Thika">Thika</option>
                        <option value="Naivasha">Naivasha</option>
                        <option value="Meru">Meru</option>
                        <option value="Kakamega">Kakamega</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Payment Method *</label>
                    <select required title="Select payment method">
                        <option value="cash">Cash on Delivery</option>
                        <option value="mpesa">M-Pesa</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Delivery Address *</label>
                <textarea required placeholder="Enter your full delivery address..." title="Enter your delivery address"></textarea>
            </div>

            <button type="button" class="form-submit" onclick="processCheckout()" title="Place your order">
                <i class="fas fa-check"></i> Place Order
            </button>
        </form>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container-fluid">
            <div class="footer-bottom">
                <p>&copy; 2024 AGROBIASHARA</p>
            </div>
        </div>
    </footer>

    <script src="../js/main.js"></script>
</body>
</html>
